name: Build iOS VPN (Sing-Box)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Clone Sing-Box Repository
        run: |
          # Клонируем официальный репозиторий sing-box
          git clone https://github.com/SagerNet/sing-box.git .
          # Переходим в папку с Flutter-клиентом
          cd clients/flutter
          # Переносим всё в корень для удобства сборки гитхаба
          mv * ../../
          cd ../../

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned iOS App
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r sing-box-vpn.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-vpn-app
          path: sing-box-vpn.ipa
