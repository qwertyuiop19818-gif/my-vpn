name: Create and Build Clean iOS VPN
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Clean App Project
        run: |
          # Создаем чистый проект с нуля прямо на сервере
          flutter create --org com.myvpn --platforms ios vpn_app
          cd vpn_app
          
          # Добавляем плагин ядра sing-box для работы с VLESS/REALITY
          flutter pub add sing_box_flutter
          
          # Переносим файлы в корень для сборщика
          mv * .[^.]* ..
          cd ..

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Dependencies
        run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned iOS App
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r clean-vpn.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-vpn-app
          path: clean-vpn.ipa
